@if (loading()) {
    <div class="spinner-container">
        <div class="spinner"></div>
    </div>
}

@if (error()) {
    <div class="state-card error">
        <p>{{ error() }}</p>
    </div>
}

<section class="page-container">

    @if (!loading() && !error()) {

        <header class="page-header">
        <div>
            <h1>Recipe Book</h1>
            <p>{{ recipeCount() }} recipes available</p>
        </div>
    </header>

        <section class="form-section">
        <app-recipe-forn
            (recipeAdded)="onRecipeAdded($event)">
        </app-recipe-forn>
    </section>

        <section class="recipes-grid">

            @for (recipe of recipes(); track recipe.id) {
                <app-recipe-item
                    [recipe]="recipe"
                    (deleteClicked)="deleteRecipe($event)">
                </app-recipe-item>
            }

        </section>

    }

</section>
