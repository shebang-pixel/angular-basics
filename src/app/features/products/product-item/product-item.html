<div class="product-card">
    
    <div class="product-header">
        <span class="product-id">#{{ product().id }}</span>
        <span class="category-badge">{{ product().category }}</span>
    </div>

    <div class="product-content">
        <h3 class="product-title">{{ product().title }}</h3>
        <p class="description">
            {{ product().description }}
        </p>
    </div>

    <div class="details-matrix">
        <div class="matrix-node">
            <span class="matrix-label">Brand</span>
            <span class="matrix-value">{{ product().brand }}</span>
        </div>

        <div class="matrix-node">
            <span class="matrix-label">Price</span>
            <span class="matrix-value price-style">${{ product().price }}</span>
        </div>

        <div class="matrix-node">
            <span class="matrix-label">Stock</span>
            <span class="matrix-value">{{ product().stock }}</span>
        </div>
    </div>

    <button class="delete-btn" type="button">
        Delete Product
    </button>
</div>
